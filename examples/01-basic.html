<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>GE · 01 基础渲染</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; }
    #app { width: 100vw; height: 100vh; }
    .panel { position: fixed; top: 16px; left: 16px; background: rgba(255,255,255,.92); padding: 14px 18px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.1); font-size: 13px; max-width: 280px; }
    .panel h1 { font-size: 15px; margin: 0 0 6px; }
    .panel code { background: #f5f5f5; padding: 1px 5px; border-radius: 4px; }
    .badge { color: #1890ff; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="panel">
    <h1>GE · 01 基础渲染 <span class="badge">rewrite</span></h1>
    <div>3 节点 + 3 条边，演示 <code>perimeter</code> 锚点与不同 <code>connector</code>。</div>
  </div>
  <script type="module">
    import { Graph } from '@ge';

    const graph = new Graph({ container: '#app', background: '#fafafa' });
    await graph.ready;

    graph.addNode({ id: 'a', x: 80, y: 140, width: 130, height: 50, fill: '#e6f7ff', stroke: '#1890ff', label: 'Start' });
    graph.addNode({ id: 'b', x: 360, y: 80, width: 130, height: 50, label: 'Process' });
    const c = graph.addNode({ id: 'c', x: 360, y: 240, width: 64, height: 64, shape: 'circle', fill: '#fff7e6', stroke: '#fa8c16', label: 'C' });

    // rounded 直角圆滑连线
    graph.addEdge({ source: 'a', target: 'b', connector: 'rounded', stroke: '#1890ff' });
    // orthogonal 路由
    graph.addEdge({ source: 'a', target: 'c', router: 'orthogonal', connector: 'rounded', stroke: '#fa8c16' });
    // smooth 贝塞尔
    graph.addEdge({ source: 'b', target: 'c', connector: 'smooth', stroke: '#52c41a' });

    console.log('nodes:', graph.getNodes().length, 'edges:', graph.getEdges().length);
    window.ge = graph;
  </script>
</body>
</html>
