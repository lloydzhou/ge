<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>GE · 05 高级</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; }
    #app { width: 100vw; height: 100vh; }
    .panel { position: fixed; top: 16px; left: 16px; background: rgba(255,255,255,.92); padding: 14px 18px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.1); font-size: 13px; max-width: 320px; pointer-events: none; }
    .panel h1 { font-size: 15px; margin: 0 0 6px; }
    .panel code { background: #f5f5f5; padding: 1px 5px; border-radius: 4px; }
    .panel li { margin: 3px 0; }
    .toolbar { position: fixed; top: 16px; right: 16px; display: flex; gap: 8px; pointer-events: none; }
    .toolbar button { padding: 8px 14px; border: 1px solid #d9d9d9; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; pointer-events: auto; }
    .toolbar button:hover { border-color: #1890ff; color: #1890ff; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="panel">
    <h1>GE · 05 高级能力</h1>
    <ul>
      <li><b>滚轮</b>缩放（以光标为中心）</li>
      <li><b>空白拖拽</b>平移画布</li>
      <li>拖节点接近其它节点 → <code>对齐辅助线</code></li>
      <li>拖<b>分组</b>（虚线框）→ 组内节点整体跟随</li>
      <li>右上方<b>导出 PNG</b></li>
    </ul>
  </div>
  <div class="toolbar">
    <button id="export">导出 PNG</button>
  </div>
  <script type="module">
    import {
      Graph, DragPlugin, SelectionPlugin, HistoryPlugin,
      MinimapPlugin, ScrollerPlugin, SnaplinePlugin,
    } from '@ge';

    const graph = new Graph({ container: '#app', background: '#fafafa' });
    await graph.ready;

    graph.use(new DragPlugin());
    graph.use(new SelectionPlugin());
    graph.use(new HistoryPlugin());
    graph.use(new MinimapPlugin());
    graph.use(new ScrollerPlugin({ minZoom: 0.2, maxZoom: 4 }));
    graph.use(new SnaplinePlugin({ threshold: 6 }));

    const a = graph.addNode({ id: 'a', x: 150, y: 210, width: 120, height: 50, fill: '#e6f7ff', stroke: '#1890ff', label: '组内A' });
    const b = graph.addNode({ id: 'b', x: 150, y: 290, width: 120, height: 50, fill: '#e6f7ff', stroke: '#1890ff', label: '组内B' });
    const c = graph.addNode({ id: 'c', x: 600, y: 250, width: 120, height: 50, fill: '#f6ffed', stroke: '#52c41a', label: '外部C' });

    // 分组并嵌入（移动分组时组内节点整体跟随）
    const g = graph.addGroup({ id: 'g', x: 110, y: 170, width: 240, height: 200, label: '分组' });
    g.embed(a);
    g.embed(b);

    // 组内节点连到组外节点（世界坐标正确）
    graph.addEdge({ source: 'a', target: 'c', router: 'orthogonal', connector: 'rounded', stroke: '#722ed1' });

    document.getElementById('export').onclick = () => {
      const url = graph.toDataURL();
      window.__lastPNG = url;
      console.log('PNG dataURL length:', url.length);
    };

    window.ge = graph;
    window.group = g;
    window.a = a;
    window.c = c;
  </script>
</body>
</html>
