<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>GE · 10 共享 root 验证</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; display: flex; gap: 16px; padding: 16px; }
    #app { border: 1px solid #d9d9d9; border-radius: 8px; }
    .sidebar { display: flex; flex-direction: column; gap: 12px; }
    #mini-container { width: 220px; height: 160px; border: 1px solid #d9d9d9; border-radius: 4px; background: #f5f5f5; }
    button { padding: 8px 16px; border: 1px solid #1890ff; background: #1890ff; color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .log { font-size: 12px; color: #666; max-width: 240px; word-break: break-all; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="sidebar">
    <div class="log" id="status">初始化中...</div>
    <div><b>Minimap（共享 root + canvas renderer）</b></div>
    <div id="mini-container"></div>
    <button id="b-export">导出（ContextService.toDataURL）</button>
    <img id="preview" style="max-width:220px;border:1px solid #eee;border-radius:4px;display:none" />
  </div>
  <script type="module">
    import { Graph } from '@ge';
    import { Canvas } from '@antv/g-lite';
    import { Renderer as CanvasRenderer } from '@antv/g-canvas';

    const status = document.getElementById('status');
    const log = (msg) => { status.textContent = msg; console.log('[验证]', msg); };

    try {
      // 主画布 SVG 渲染器
      log('创建主画布 (svg renderer)...');
      const graph = new Graph({ container: '#app', width: 600, height: 400, background: '#fafafa' });
      await graph.ready;
      log('主画布 ready');

      graph.addNode({ id: 'a', shape: 'rect', x: 80, y: 80, width: 100, height: 50, fill: '#e6f7ff', stroke: '#1890ff', label: 'Node A' });
      graph.addNode({ id: 'b', shape: 'circle', x: 350, y: 200, width: 80, height: 80, fill: '#f6ffed', stroke: '#52c41a', label: 'Circle' });
      graph.addNode({ id: 'c', shape: 'triangle', x: 150, y: 250, width: 90, height: 70, fill: '#fff7e6', stroke: '#fa8c16', label: 'Tri' });
      graph.addEdge({ source: 'a', target: 'b', stroke: '#722ed1', strokeWidth: 2 });
      graph.addEdge({ source: 'a', target: 'c', stroke: '#722ed1', strokeWidth: 2 });
      log('节点 + 边已添加');

      // Minimap：独立 Canvas（canvas renderer），共享 root
      log('创建 minimap canvas...');
      const root = graph.getRoot();
      const mini = new Canvas({
        container: document.getElementById('mini-container'),
        renderer: new CanvasRenderer(),
        width: 220,
        height: 160,
      });
      await mini.ready;
      log('minimap canvas ready');

      // 关键：共享场景图根
      const miniRC = mini.getRenderingContext();
      miniRC.root = root;
      log(`共享 root: ${miniRC.root === root ? '✅' : '❌'}`);

      // 每帧渲染：手动标记所有 DisplayObject dirty（解决 dirty tracking 不共享）
      let frameCount = 0;
      const renderMini = () => {
        // 递归标记所有后代 dirty
        const markDirty = (obj) => {
          if (!obj) return;
          obj.dirty = true;
          if (obj.renderBoundsDirty !== undefined) obj.renderBoundsDirty = true;
          if (obj.children) for (const child of obj.children) markDirty(child);
        };
        markDirty(root);
        miniRC.force = true;
        mini.render();
        frameCount++;
        if (frameCount === 1) log('✅ minimap 首帧渲染完成');
        if (frameCount <= 3) console.log(`[验证] minimap frame ${frameCount}`);
        requestAnimationFrame(renderMini);
      };
      // 延迟一帧启动（等主画布渲染完）
      setTimeout(() => { log('启动 minimap 渲染循环...'); renderMini(); }, 100);

      // 导出测试
      document.getElementById('b-export').onclick = async () => {
        log('导出中...');
        try {
          const url = await graph.toDataURL('image/png');
          const img = document.getElementById('preview');
          img.src = url; img.style.display = 'block';
          log(`✅ 导出成功 (${url.length} 字符)`);
          const a = document.createElement('a');
          a.href = url; a.download = 'ge-export.png'; a.click();
        } catch (e) {
          log(`❌ 导出失败: ${e.message}`);
        }
      };

      log('✅ 全部就绪');
    } catch (e) {
      log(`❌ 错误: ${e.message}`);
      console.error(e);
    }
  </script>
</body>
</html>
